<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquire — Let's Go Out! ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #fff0f3;
            --surface: #ffffff;
            --text-main: #5c4347;
            --text-muted: #a3858a;
            --primary: #ff758f; 
            --primary-hover: #ff4d6d;
            --accent: #fff0f3;
            --border: #fecdd3;
            --radius: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', -apple-system, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            color: var(--text-main);
            padding: 40px 20px;
            overflow-y: auto;
        }

        .card {
            background: var(--surface);
            padding: 2.5rem 2rem;
            border-radius: var(--radius);
            border: 4px solid var(--border);
            box-shadow: 0 16px 32px rgba(255, 154, 172, 0.15);
            max-width: 460px;
            width: 100%;
            text-align: center;
            position: relative;
            margin: auto;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.9rem;
            padding-right: 2.5rem; 
            border: 3px solid var(--accent);
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fffbfe;
            color: var(--text-main);
            appearance: none; 
            cursor: pointer;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--primary);
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        /* CUSTOM DATE PICKER BLOCK */
        .custom-slot-row {
            background: #fffbfe;
            border: 3px solid var(--accent);
            padding: 15px;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .slot-selectors {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
        }

        .add-slot-btn {
            background: transparent;
            color: var(--primary);
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            display: inline-block;
            padding: 5px;
            transition: color 0.2s;
        }

        .add-slot-btn:hover {
            color: var(--primary-hover);
        }

        /* Cute Grid Cards for Date Ideas (Both Views) */
        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1rem;
        }

        .idea-card {
            border: 3px solid var(--accent);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            background: #fffbfe;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            position: relative;
        }

        .idea-card:hover { transform: scale(1.05); border-color: var(--border); }

        .idea-card img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 6px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .idea-card span {
            font-size: 0.8rem;
            font-weight: 600;
            display: block;
            color: var(--text-main);
        }

        .idea-card.selected {
            background-color: #ffe5ec;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .idea-card .badge-check {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .idea-card.selected .badge-check {
            opacity: 1;
        }

        /* Selections for Timeslots */
        .selection-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 1.5rem 0 0.6rem 0;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .selection-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            margin-bottom: 1rem;
        }

        .select-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border: 3px solid var(--accent);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fffbfe;
        }

        .select-item:hover { border-color: var(--border); }

        .select-item.selected {
            border-color: var(--primary);
            background-color: #ffe5ec;
        }

        .select-item input[type="radio"] {
            accent-color: var(--primary);
            transform: scale(1.3);
        }

        /* Buttons & Actions Balanced Row Layout */
        .btn {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary);
            color: white;
            box-shadow: 0 8px 0px #e63956;
            margin-bottom: 8px;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #e63956;
        }

        .proposal-actions {
            display: flex;
            gap: 16px; 
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            min-height: 60px;
            width: 100%;
        }

        #yes-btn {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 6px 0px #e63956;
            width: 160px; 
            height: 50px; 
            transition: transform 0.2s ease;
        }

        #yes-btn:active { transform: translateY(3px); box-shadow: 0 3px 0px #e63956; }

        #no-btn {
            background-color: #fbf8f9;
            color: #927e83;
            border: 3px solid #e1d3d6;
            border-radius: 50px;
            width: 140px; 
            height: 50px;
            flex: none;
            transition: left 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hidden { display: none !important; }
        
        .header-illustration {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        .deployment-meta {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #c9afb3;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <!-- PHASE 1: ASKER CREATOR APP -->
    <div class="card" id="asker-card">
        <div class="header-illustration">💌</div>
        <h2>Create Invite ✨</h2>
        <p>Set up your perfect date package!</p>

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="asker-name" placeholder="Alex">
        </div>

        <div class="form-group">
            <label>Their Name</label>
            <input type="text" id="recipient-name" placeholder="Taylor">
        </div>

        <div class="form-group">
            <label>Date Ideas (Pick Multiple) 🍕</label>
            <div class="ideas-grid" id="ideas-wrapper"></div>
        </div>

        <div class="form-group">
            <label>Propose Date & Time Options ⏰</label>
            <div class="slots-container" id="slots-wrapper"></div>
            <button class="add-slot-btn" id="add-slot-trigger">+ Add Another Date Option</button>
        </div>

        <button class="btn btn-primary" id="generate-btn">Generate Demo ➔</button>
        
        <div class="deployment-meta">Live Build: June 4, 2026 • 16:45 PHT</div>
    </div>

    <!-- PHASE 2: RECIPIENT INTERACTIVE APP -->
    <div class="card hidden" id="recipient-card">
        <div class="header-illustration" id="recipient-emoji">✨</div>
        <h2 id="recipient-title">Hey! 💕</h2>
        <p id="recipient-subtitle">Pick your preferences:</p>

        <div class="selection-section-title">1. Pick the Vibe (Choose Multiple)</div>
        <div class="ideas-grid" id="recipient-ideas-grid"></div>

        <div class="selection-section-title">2. Pick the Time</div>
        <div class="selection-list" id="slots-selector-container"></div>

        <div class="form-group hidden" id="other-input-container">
            <label>What do you prefer instead? ✨</label>
            <input type="text" id="other-freeform" placeholder="e.g., Arcade & bubble tea?">
        </div>

        <div class="proposal-actions" id="action-wrapper">
            <button class="btn" id="yes-btn">Yes</button>
            <button class="btn" id="no-btn">Decline</button>
        </div>
        
        <div class="deployment-meta">Live Build: June 4, 2026 • 16:45 PHT</div>
    </div>

    <script>
        // FIXED THE MATCHER LINK GRAPHICS TO CORRESPOND ACCURATELY WITH THE USER REQUEST
        const dateCatalog = [
            { id: 'pizza', label: 'Pizza', img: 'https://cdn-icons-png.flaticon.com/128/3595/3595455.png' },
            { id: 'ramen', label: 'Ramen', img: 'https://cdn-icons-png.flaticon.com/128/1041/1041312.png' }, // Actual Ramen Bowl illustration
            { id: 'coffee', label: 'Coffee', img: 'https://cdn-icons-png.flaticon.com/128/924/924514.png' },
            { id: 'drinks', label: 'Drinks', img: 'https://cdn-icons-png.flaticon.com/128/2441/2441118.png' }, // Interactive Cocktail Glasses
            { id: 'steak', label: 'Steak', img: 'https://cdn-icons-png.flaticon.com/128/2921/2921948.png' },  // Raw Marbled Wagyu Cut
            { id: 'gym', label: 'Gym', img: 'https://cdn-icons-png.flaticon.com/128/2964/2964514.png' },
            { id: 'walk', label: 'Walk', img: 'https://cdn-icons-png.flaticon.com/128/4383/4383626.png' },
            { id: 'run', label: 'Run', img: 'https://cdn-icons-png.flaticon.com/128/5147/5147006.png' },
            { id: 'any', label: 'Surprise Me!', img: 'https://cdn-icons-png.flaticon.com/128/6165/6165577.png' } // Mystery Box Asset
        ];

        const selectedIdeas = new Set();
        const recipientSelectedIdeas = new Set();
        const wrapper = document.getElementById('ideas-wrapper');

        dateCatalog.forEach(item => {
            const el = document.createElement('div');
            el.className = 'idea-card';
            el.innerHTML = `<img src="${item.img}"><span>${item.label}</span>`;
            el.addEventListener('click', () => {
                if(selectedIdeas.has(item.id)) {
                    selectedIdeas.delete(item.id);
                    el.classList.remove('selected');
                } else {
                    selectedIdeas.add(item.id);
                    el.classList.add('selected');
                }
            });
            wrapper.appendChild(el);
        });

        function generateDateOptions() {
            let options = [];
            for (let i = 0; i < 7; i++) {
                let d = new Date();
                d.setDate(d.getDate() + i);
                let label = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
                if(i === 0) label = "Today (" + label + ")";
                if(i === 1) label = "Tomorrow (" + label + ")";
                options.push(label);
            }
            return options;
        }

        function generateTimeOptions() {
            let options = [];
            for (let hour = 8; hour <= 22; hour++) {
                let ampm = hour >= 12 ? 'PM' : 'AM';
                let displayHour = hour > 12 ? hour - 12 : hour;
                options.push(`${displayHour}:00 ${ampm}`);
                options.push(`${displayHour}:30 ${ampm}`);
            }
            return options;
        }

        const slotsWrapper = document.getElementById('slots-wrapper');
        
        function createCustomPickerRow() {
            const row = document.createElement('div');
            row.className = 'custom-slot-row';
            
            const dateWrapper = document.createElement('div');
            dateWrapper.className = 'select-wrapper';
            const dateSelect = document.createElement('select');
            dateSelect.className = 'slot-date-select';
            generateDateOptions().forEach(d => {
                dateSelect.innerHTML += `<option value="${d}">${d}</option>`;
            });
            dateWrapper.appendChild(dateSelect);

            const timeWrapper = document.createElement('div');
            timeWrapper.className = 'select-wrapper';
            const timeSelect = document.createElement('select');
            timeSelect.className = 'slot-time-select';
            generateTimeOptions().forEach(t => {
                timeSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
            timeWrapper.appendChild(timeSelect);

            const structure = document.createElement('div');
            structure.className = 'slot-selectors';
            structure.appendChild(dateWrapper);
            structure.appendChild(timeWrapper);
            
            row.appendChild(structure);
            slotsWrapper.appendChild(row);
        }

        createCustomPickerRow();
        document.getElementById('add-slot-trigger').addEventListener('click', createCustomPickerRow);

        const generateBtn = document.getElementById('generate-btn');
        generateBtn.addEventListener('click', () => {
            const asker = document.getElementById('asker-name').value || "Alex";
            const recipient = document.getElementById('recipient-name').value || "Taylor";
            
            const dateSelects = document.querySelectorAll('.slot-date-select');
            const timeSelects = document.querySelectorAll('.slot-time-select');
            const processedSlots = [];

            dateSelects.forEach((selectNode, idx) => {
                const dateVal = selectNode.value;
                const timeVal = timeSelects[idx].value;
                processedSlots.push(`${dateVal} @ ${timeVal}`);
            });

            document.getElementById('recipient-title').innerText = `Hey ${recipient}! 💕`;
            document.getElementById('recipient-subtitle').innerText = `${asker} wants to take you out! Customize the itinerary:`;

            const recipientIdeasGrid = document.getElementById('recipient-ideas-grid');
            recipientIdeasGrid.innerHTML = '';
            
            if(selectedIdeas.size === 0) selectedIdeas.add('any');
            
            selectedIdeas.forEach(id => {
                const match = dateCatalog.find(x => x.id === id);
                const cardEl = document.createElement('div');
                cardEl.className = 'idea-card';
                cardEl.innerHTML = `<div class="badge-check">✓</div><img src="${match.img}"><span>${match.label}</span>`;
                
                cardEl.addEventListener('click', () => {
                    if(recipientSelectedIdeas.has(match.id)) {
                        recipientSelectedIdeas.delete(match.id);
                        cardEl.classList.remove('selected');
                    } else {
                        recipientSelectedIdeas.add(match.id);
                        cardEl.classList.add('selected');
                    }
                });
                recipientIdeasGrid.appendChild(cardEl);
            });

            const otherCardEl = document.createElement('div');
            otherCardEl.className = 'idea-card';
            otherCardEl.innerHTML = `<div class="badge-check">✓</div><img src="https://cdn-icons-png.flaticon.com/128/1828/1828940.png"><span>Other...</span>`;
            otherCardEl.addEventListener('click', () => {
                const otherInput = document.getElementById('other-input-container');
                if(recipientSelectedIdeas.has('other')) {
                    recipientSelectedIdeas.delete('other');
                    otherCardEl.classList.remove('selected');
                    otherInput.classList.add('hidden');
                } else {
                    recipientSelectedIdeas.add('other');
                    otherCardEl.classList.add('selected');
                    otherInput.classList.remove('hidden');
                }
            });
            recipientIdeasGrid.appendChild(otherCardEl);

            const slotsContainer = document.getElementById('slots-selector-container');
            slotsContainer.innerHTML = '';
            processedSlots.forEach((slotText, index) => {
                const labelEl = document.createElement('label');
                labelEl.className = 'select-item';
                labelEl.innerHTML = `<input type="radio" name="time-radio" value="time-${index}"> <span>${slotText}</span>`;
                labelEl.querySelector('input').addEventListener('change', (e) => {
                    slotsContainer.querySelectorAll('.select-item').forEach(x => x.classList.remove('selected'));
                    if(e.target.checked) labelEl.classList.add('selected');
                });
                slotsContainer.appendChild(labelEl);
            });

            document.getElementById('asker-card').classList.add('hidden');
            document.getElementById('recipient-card').classList.remove('hidden');
            window.scrollTo(0, 0);
        });

        const noBtn = document.getElementById('no-btn');
        
        function dodge() {
            if(noBtn.style.position !== 'fixed') {
                const initialRect = noBtn.getBoundingClientRect();
                noBtn.style.left = initialRect.left + 'px';
                noBtn.style.top = initialRect.top + 'px';
                noBtn.style.position = 'fixed';
            }

            const padding = 40;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * (maxX - padding) + padding);
            const randomY = Math.floor(Math.random() * (maxY - padding) + padding);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', dodge);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });

        document.getElementById('yes-btn').addEventListener('click', () => {
            let vibes = [];
            recipientSelectedIdeas.forEach(id => {
                if(id === 'other') {
                    const altVal = document.getElementById('other-freeform').value;
                    vibes.push(altVal ? `Custom Vibe (${altVal})` : 'Alternative Custom Plan');
                } else {
                    vibes.push(dateCatalog.find(x => x.id === id).label);
                }
            });
            
            const selectedTimeEl = document.querySelector('input[name="time-radio"]:checked');
            const finalTime = selectedTimeEl ? selectedTimeEl.parentElement.querySelector('span').innerText : "a perfect time";

            document.getElementById('recipient-emoji').innerText = '🎉✨';
            document.getElementById('recipient-title').innerText = "It's a date!!";
            document.getElementById('recipient-subtitle').innerHTML = `Going for: <strong>${vibes.join(' & ') || 'Surprise Vibe'}</strong><br>Scheduled for: <strong>${finalTime}</strong>.<br><br>Can't wait! 🍰🌸`;
            
            document.querySelectorAll('.selection-section-title').forEach(el => el.classList.add('hidden'));
            document.getElementById('recipient-ideas-grid').classList.add('hidden');
            document.getElementById('slots-selector-container').classList.add('hidden');
            document.getElementById('other-input-container').classList.add('hidden');
            document.getElementById('action-wrapper').classList.add('hidden');
            window.scrollTo(0, 0);
        });
    </script>
</body>
</html>
